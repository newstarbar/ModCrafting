name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache toolchain resources
        uses: actions/cache@v4
        with:
          path: |
            resources/jdk-21
            resources/gradle-9.5
            resources/gradle-home-seed
          key: toolchain-${{ hashFiles('resources/fabric-versions.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Setup full toolchain
        run: npm run setup:toolchain

      - name: Prefetch Fabric deps
        run: npm run prefetch:deps

      - name: Render update manifest
        run: node scripts/render-update-manifest.mjs "${{ github.ref_name }}" "Release ${{ github.ref_name }}"

      - name: Build app
        run: npm run build

      - name: Build Setup (NSIS) and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always

      - name: Build Portable
        run: npx electron-builder --config electron-builder.portable.json --win portable

      - name: Sync Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
        run: node scripts/sync-gitee-release.mjs "${{ github.ref_name }}"

      - name: Commit update manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/update-manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push || echo "Manifest push skipped (may need manual merge)"
