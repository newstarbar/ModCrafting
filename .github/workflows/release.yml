name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache toolchain resources
        uses: actions/cache@v4
        with:
          path: |
            resources/jdk-21
            resources/gradle-9.5
            resources/gradle-home-seed
          key: toolchain-${{ hashFiles('resources/fabric-versions.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Setup full toolchain
        run: npm run setup:toolchain

      - name: Prefetch Fabric deps
        run: npm run prefetch:deps

      - name: Prepare installer assets
        run: |
          npm run generate:icon
          node scripts/patch-nsis-install-ui.mjs

      - name: Render release notes
        run: node scripts/render-release-notes.mjs "${{ github.ref_name }}"

      - name: Render update manifest
        run: node scripts/render-update-manifest.mjs "${{ github.ref_name }}"

      - name: Build app
        run: npm run build

      - name: Build Setup (NSIS) and publish GitHub Release
        run: node scripts/run-electron-builder.mjs --win nsis --publish always

      - name: Build Portable
        run: node scripts/run-electron-builder.mjs --config electron-builder.portable.json --win portable

      - name: Sync Gitee Release
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          # 可选：覆盖 build/gitee-config.json 中的 owner/repo
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
        run: node scripts/sync-gitee-release.mjs "${{ github.ref_name }}"

      - name: Commit update manifest
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MANIFEST="build/update-manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "Manifest not found, skip"
            exit 0
          fi
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          git checkout "${{ github.sha }}" -- "$MANIFEST"
          git add "$MANIFEST"
          if git diff --staged --quiet; then
            echo "Manifest unchanged on main, skip"
            exit 0
          fi
          git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin main
